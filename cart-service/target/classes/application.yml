server:
  port: 8081
  servlet:
    session:
      timeout: 30m
      cookie:
        name: GUEST_SESSION
        http-only: true
        same-site: lax

spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:mysql://localhost:3306/cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Spring Session - store sessions in MySQL (SPRING_SESSION table)
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
      table-name: SPRING_SESSION

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

logging:
  level:
    com.ecommerce.cart: DEBUG
    org.springframework.session: DEBUG
