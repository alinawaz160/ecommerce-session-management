server:
  port: 8081

spring:
  ai:
    ollama:
      chat:
        options:
          model: llama2:latest
    openai:
      api-key: ${OPENAI_API_KEY}
    application:
      name: cart-service

  datasource:
    url: jdbc:mysql://localhost:3306/cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true


checkout-service:
  base-url: http://localhost:8082

jwt:
  secret: "ecommerce-jwt-secret-key-minimum-256-bits-for-HS256-algorithm-ok"
  access-token-expiry: 900      # 15 minutes in seconds
  refresh-token-expiry: 604800  # 7 days in seconds

logging:
  level:
    com.ecommerce.cart: DEBUG
