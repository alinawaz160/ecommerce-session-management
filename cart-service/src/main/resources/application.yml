server:
  port: 8081
  servlet:
    session:
      timeout: 30m
      cookie:
        name: GUEST_SESSION
        http-only: true
        same-site: lax

spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:mysql://localhost:3306/cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

pug4j:
  prefix: classpath:/templates/
  suffix: .pug
  cache: false

checkout-service:
  base-url: http://localhost:8082

logging:
  level:
    com.ecommerce.cart: DEBUG
